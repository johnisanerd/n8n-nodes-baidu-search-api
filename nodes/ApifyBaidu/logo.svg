<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- badge -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="#2563EB"/>
  <!-- paw / magnifier blend: simple bear-paw dots above a magnifier -->
  <g fill="#DBEAFE">
    <circle cx="22" cy="18" r="3.5"/>
    <circle cx="32" cy="15" r="3.5"/>
    <circle cx="42" cy="18" r="3.5"/>
  </g>
  <!-- magnifier ring -->
  <circle cx="28" cy="36" r="11" fill="none" stroke="#FFFFFF" stroke-width="5"/>
  <line x1="36" y1="44" x2="48" y2="52" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
</svg>
